name: Build SunDevPro PrintBridge

on:
  workflow_dispatch:
  push:
    paths:
      - 'printbridge/**'
      - '.github/workflows/build-printbridge.yml'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish x64 autonome
        shell: pwsh
        run: |
          dotnet publish printbridge/SunDevPro.PrintBridge/SunDevPro.PrintBridge.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o printbridge/publish

      - name: Installer Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Compiler setup complet
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "printbridge\Installer\SETUP_COMPLET.iss"'

      - name: Compiler mise à jour
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "printbridge\Installer\MISE_A_JOUR.iss"'

      - name: Contrôler les livrables
        shell: pwsh
        run: |
          $required = @(
            'dist\SunDevPro_V1.0.23_SETUP_COMPLET.exe',
            'dist\SunDevPro_V1.0.23_MISE_A_JOUR.exe'
          )
          foreach ($file in $required) {
            if (-not (Test-Path $file)) { throw "Livrable absent : $file" }
            Get-FileHash $file -Algorithm SHA256
          }

      - name: Publier les deux installateurs
        uses: actions/upload-artifact@v4
        with:
          name: SunDevPro-V1.0.23-PrintBridge-Installateurs
          path: |
            dist/SunDevPro_V1.0.23_SETUP_COMPLET.exe
            dist/SunDevPro_V1.0.23_MISE_A_JOUR.exe
          if-no-files-found: error
